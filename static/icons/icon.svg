<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8E23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#556B2F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="thermometer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Thermometer body -->
  <rect x="220" y="100" width="72" height="220" rx="36" fill="url(#thermometer)"/>

  <!-- Thermometer bulb -->
  <circle cx="256" cy="360" r="64" fill="url(#thermometer)"/>

  <!-- Mercury/temperature indicator -->
  <rect x="238" y="180" width="36" height="140" rx="18" fill="#E74C3C"/>
  <circle cx="256" cy="360" r="48" fill="#E74C3C"/>

  <!-- Temperature marks -->
  <rect x="296" y="130" width="24" height="4" rx="2" fill="#8fbc3b"/>
  <rect x="296" y="160" width="16" height="4" rx="2" fill="#8fbc3b"/>
  <rect x="296" y="190" width="24" height="4" rx="2" fill="#8fbc3b"/>
  <rect x="296" y="220" width="16" height="4" rx="2" fill="#8fbc3b"/>
  <rect x="296" y="250" width="24" height="4" rx="2" fill="#8fbc3b"/>
  <rect x="296" y="280" width="16" height="4" rx="2" fill="#8fbc3b"/>

  <!-- Heart symbol for health tracking -->
  <path d="M256 440 C220 410, 180 380, 180 340 C180 310, 210 290, 240 310 C256 320, 256 320, 256 320 C256 320, 256 320, 272 310 C302 290, 332 310, 332 340 C332 380, 292 410, 256 440 Z" fill="#8fbc3b" opacity="0.9"/>
</svg>
